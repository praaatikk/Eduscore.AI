{% extends "base.html" %}

{% block title %}Predict - Eduscore.AI{% endblock %}

{% block content %}
<style>
  .card {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    border: none;
    border-radius: 20px;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    padding: 30px;
    width: 100%;
    max-width: 600px;
    color: #fff;
    animation: fadeIn 1s ease;
    margin: 0 auto;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h1 {
    text-align: center;
    font-weight: 600;
    margin-bottom: 25px;
  }

  label {
    font-weight: 500;
    margin-bottom: 5px;
  }

  select, input {
    border-radius: 10px !important;
    margin-bottom: 15px;
  }

  .btn-primary {
    background: linear-gradient(135deg, #43e97b, #38f9d7);
    border: none;
    color: #000;
    font-weight: 600;
    border-radius: 12px;
    transition: all 0.3s ease;
    width: 100%;
    padding: 10px;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    background: linear-gradient(135deg, #38f9d7, #43e97b);
  }

  h2 {
    text-align: center;
    color: #fff;
    margin-top: 20px;
    font-weight: 500;
    animation: fadeIn 1s ease-in;
  }
</style>

<div class="card">
  <h1>Eduscore.AI</h1>

  <form action="{{ url_for('predict_datapoint') }}" method="post">

    <label>Gender</label>
    <select class="form-control" name="gender" required>
      <option selected disabled value="">Select Gender</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
    </select>

    <label>Race or Ethnicity</label>
    <select class="form-control" name="ethnicity" required>
      <option selected disabled value="">Select Ethnicity</option>
      <option value="group A">Group A</option>
      <option value="group B">Group B</option>
      <option value="group C">Group C</option>
      <option value="group D">Group D</option>
      <option value="group E">Group E</option>
    </select>

    <label>Parental Level of Education</label>
    <select class="form-control" name="parental_level_of_education" required>
      <option selected disabled value="">Select Education Level</option>
      <option value="associate's degree">Associate's degree</option>
      <option value="bachelor's degree">Bachelor's degree</option>
      <option value="high school">High school</option>
      <option value="master's degree">Master's degree</option>
      <option value="some college">Some college</option>
      <option value="some high school">Some high school</option>
    </select>

    <label>Lunch Type</label>
    <select class="form-control" name="lunch" required>
      <option selected disabled value="">Select Lunch Type</option>
      <option value="free/reduced">Free/reduced</option>
      <option value="standard">Standard</option>
    </select>

    <label>Test Preparation Course</label>
    <select class="form-control" name="test_preparation_course" required>
      <option selected disabled value="">Select Course</option>
      <option value="none">None</option>
      <option value="completed">Completed</option>
    </select>

    <label>Reading Score (0–100)</label>
    <input class="form-control" type="number" name="reading_score" placeholder="Enter Reading Score" min="0" max="100" required>

    <label>Writing Score (0–100)</label>
    <input class="form-control" type="number" name="writing_score" placeholder="Enter Writing Score" min="0" max="100" required>

    <button class="btn btn-primary mt-3" type="submit">Predict Math Score</button>
  </form>

  {% if results %}
    <h2>🎯 Predicted Math Score: <strong>{{ results }}</strong></h2>
  {% endif %}
</div>

{% endblock %}
